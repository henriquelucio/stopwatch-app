<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StopWatch</title>
    <script src="main.js" defer></script>
</head>
<body>
    <h1>StopWatch</h1>

        <div id="display">00:00.00</div>

    </div>
